<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">iMersDocs | Asset OS</title>
    
    <!-- Load Tailwind CSS secara eksternal untuk styling modern yang cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Google Fonts: Poppins untuk estetika profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome v6 untuk library ikon yang konsisten -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style id="dynamicStyles">
        :root {
            --brand-primary: #4F46E5;
            --brand-secondary: #111827;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #F9FAFB; 
            color: var(--brand-secondary) !important;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
        }

        /* OVERRIDE TAILWIND: Memaksa warna dari Google Sheet muncul di judul & teks */
        .text-gray-900, h1, h2, h3, h4, h5, h6, #headerTitle { 
            color: var(--brand-secondary) !important; 
        }

        /* Warna Ikon & Background Utama */
        .text-primary { color: var(--brand-primary) !important; }
        .bg-primary { background-color: var(--brand-primary) !important; }

        /* Support Teks Gradient */
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent !important;
            display: inline-block;
        }
    
        /* OVERRIDE TAILWIND: Biar warna di Google Sheet mengalahkan warna default CSS */
        .text-gray-900 { color: var(--brand-secondary) !important; }
        .text-primary { color: var(--brand-primary) !important; }
        .bg-primary { background-color: var(--brand-primary) !important; }
        
        /* Sidebar link active background (Soft Orange) */
        .sidebar-link.active { 
            background-color: rgba(255, 90, 31, 0.1) !important; 
            color: var(--brand-primary) !important; 
        }

        .saas-card:hover { 
            border-color: var(--brand-primary) !important; 
        }

        /* Styling Sidebar Kiri */
        .sidebar { 
            width: 280px; 
            border-right: 1px solid #F3F4F6; 
            background: white; 
            z-index: 50; 
            flex-shrink: 0; 
        }
        
        .sidebar-link {
            display: flex; 
            align-items: center; 
            padding: 10px 16px; 
            margin: 4px 12px;
            border-radius: 10px; 
            font-size: 0.875rem; 
            font-weight: 500; 
            color: #4B5563;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }
        
        .sidebar-link:hover { 
            background-color: #F3F4F6; 
            color: #111827; 
        }
        
        .sidebar-link.active { 
            background-color: #EEF2FF; 
            color: var(--brand-primary); 
        }

        .alphabet-label {
            font-size: 10px; 
            font-weight: 700; 
            color: #9CA3AF;
            padding: 24px 28px 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }

        /* Area Konten Utama */
        .content-area { 
            flex: 1; 
            height: 100vh; 
            overflow-y: auto; 
            background-color: #FBFCFD; 
            scroll-behavior: smooth;
        }

        /* Card Produk & Folder */
        .saas-card {
            background: #FFFFFF; 
            border: 1px solid #E5E7EB; 
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }
        
        .saas-card:hover { 
            border-color: var(--brand-primary); 
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.15); 
            transform: translateY(-4px); 
        }

        /* Card Konten Aset */
        .asset-card { 
            background: #FFFFFF; 
            border: 1px solid #E5E7EB; 
            border-radius: 16px; 
            padding: 24px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* Efek Hover Glow Premium Berwarna */
        .asset-card:hover {
            border-color: var(--brand-primary);
            box-shadow: 0 20px 40px -12px rgba(79, 70, 229, 0.3);
            transform: translateY(-8px);
            background: white;
        }

        /* Input Custom Styling */
        .saas-input {
            width: 100%; 
            background: #FFFFFF; 
            border: 1px solid #D1D5DB; 
            border-radius: 10px;
            padding: 10px 14px; 
            font-size: 0.875rem; 
            outline: none; 
            transition: all 0.2s;
        }
        
        .saas-input:focus { 
            border-color: #4F46E5; 
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); 
        }

        /* Tombol Utama - Gradient Indigo Purple Blue */
        .btn-black {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #3b82f6 100%) !important; 
            color: white !important; 
            padding: 12px 20px;
            border-radius: 10px; 
            font-size: 0.875rem; 
            font-weight: 600; 
            transition: all 0.3s ease;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            cursor: pointer;
            border: none;
        }
        
        .btn-black:hover { 
            opacity: 0.9; 
            transform: translateY(-1px); 
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        
        .btn-black:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile Navigation Bar Styling */
        .mobile-nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid #F3F4F6; display: flex; justify-content: space-around;
            align-items: center; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }

        .mobile-nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #9CA3AF; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }

        .mobile-nav-item i {
            font-size: 18px; transition: all 0.2s;
        }

        /* Utility Classes */
        .text-primary { color: var(--brand-primary); }
        .bg-primary { background-color: var(--brand-primary); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Loading Screen */
        #loading-overlay {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Badge Sub-Kategori */
        .sub-cat-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: white; border: 1px solid #E5E7EB; padding: 6px 12px;
            border-radius: 8px; font-size: 11px; font-weight: 700; color: var(--brand-primary);
            text-transform: uppercase; letter-spacing: 0.02em; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .sidebar-footer {
            padding: 20px 24px; 
            border-top: 1px solid #F3F4F6;
            margin-top: auto; 
            background: #FAFBFC;
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content-area { padding-bottom: 80px; }
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- Animasi Sinkronisasi Database -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Mensinkronkan Workspace...</p>
        </div>
    </div>

    <!-- SIDEBAR NAVIGATION - LOGIC: hidden (mobile) md:flex (desktop) -->
    <aside class="sidebar hidden md:flex flex-col h-full">
        <!-- Logo Brand & Nama Interaktif -->
        <div class="p-8 flex items-center gap-3 cursor-pointer group" id="logoBtn">
            <div id="brandLogoContainer" class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center shadow-lg group-active:scale-90 transition-all overflow-hidden">
                <!-- SVG Ikon diisi secara dinamis via JS -->
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-900" id="brandNameDisplay">Loading...</h1>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar">
            <div class="px-6 mb-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Main Menu</p>
            </div>
            
            <div onclick="showHome()" class="sidebar-link active" id="navHome">
                <span id="overviewIconContainer" class="mr-3 w-4 flex justify-center text-sm"></span>
                <span id="overviewTextDisplay">Overview</span>
            </div>

            <div id="sidebarProductList"></div>

            <!-- Stealth Console Menu (Hanya Admin) -->
            <div id="adminMenu" class="hidden mt-8 border-t border-gray-100 pt-6 pb-6 animate-in">
                <div class="px-6 mb-2">
                    <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest px-2">Admin Console</p>
                </div>
                
                <div onclick="checkAdmin('asset')" class="sidebar-link" id="navAsset">
                    <i class="fa-solid fa-file-pen mr-3 w-4 text-emerald-500"></i> Manage Assets
                </div>
                
                <div onclick="checkAdmin('product')" class="sidebar-link" id="navProduct">
                    <i class="fa-solid fa-layer-group mr-3 w-4 text-pink-500"></i> Manage Products
                </div>
                
                <div onclick="logoutAdmin()" class="sidebar-link text-gray-400 hover:text-red-500 mt-4">
                    <i class="fa-solid fa-power-off mr-3 w-4"></i> Lock Console
                </div>
            </div>
        </div>

        <!-- Footer Sidebar -->
        <div class="sidebar-footer">
            <div id="footerDisplay" class="text-[9px] font-medium text-gray-400 leading-relaxed"></div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="content-area flex flex-col">
        
        <!-- Header & Navigasi Breadcrumbs -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-10 py-5 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold text-gray-900 cursor-pointer" id="headerTitle" onclick="showHome()">Library</h2>
                
                <div id="breadcrumb" class="hidden flex items-center gap-2">
                    <i class="fa-solid fa-chevron-right text-[8px] text-gray-300"></i>
                    <span id="breadcrumbProduct" class="text-xs text-gray-500 font-medium px-2 py-1 bg-gray-50 rounded-md cursor-pointer hover:bg-gray-100 transition-colors">Product</span>
                    
                    <div id="breadcrumbCategoryContainer" class="hidden flex items-center gap-2">
                        <i class="fa-solid fa-chevron-right text-[8px] text-gray-300"></i>
                        <span id="breadcrumbCategory" class="text-xs text-indigo-600 font-semibold px-2 py-1 bg-indigo-50 rounded-md">Category</span>
                    </div>
                </div>
            </div>

            <!-- Search Area -->
            <div class="flex items-center gap-6">
                <div class="relative w-64 group">
                    <input type="text" id="globalSearch" placeholder="Cari aset..." class="saas-input pl-10 text-xs bg-gray-50 border-transparent focus:bg-white focus:border-gray-200 py-2.5">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                </div>
            </div>
        </header>

        <!-- Area Rendering Konten Dinamis -->
        <div id="viewArea" class="p-10 animate-in">
            <!-- Diisi via JS -->
        </div>

    </main>

    <!-- MOBILE NAVIGATION BAR (Muncul hanya di HP) -->
    <nav class="mobile-nav-bar md:hidden">
        <div onclick="showHome()" class="mobile-nav-item">
            <i class="fa-solid fa-house text-indigo-500"></i>
            <span>Home</span>
        </div>
        <div onclick="showHome()" class="mobile-nav-item">
            <i class="fa-solid fa-boxes-stacked text-pink-500"></i>
            <span>Vault</span>
        </div>        
    </nav>

    <!-- ADMIN AUTH MODAL -->
    <div id="adminAuth" class="hidden fixed inset-0 z-[100] bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-10 w-full max-w-sm rounded-2xl shadow-2xl">
            <div class="w-14 h-14 bg-indigo-50 rounded-xl mx-auto mb-6 flex items-center justify-center">
                <i class="fa-solid fa-shield-halved text-indigo-600 text-xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 text-center text-gray-900">Verify Access</h3>
            <p class="text-xs text-gray-400 mb-8 text-center">Masukkan Master Key untuk membuka Admin Console.</p>
            <input type="password" id="adminPass" placeholder="••••••••" class="saas-input text-center tracking-[1em] mb-8 font-black text-lg py-3">
            <div class="flex gap-4">
                <button onclick="closeAuth()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase tracking-widest">Batal</button>
                <button onclick="loginAdmin()" class="flex-1 btn-black shadow-xl">Unlock</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-24 md:bottom-10 right-10 z-[200] opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-xl flex items-center gap-3 shadow-2xl border border-white/10">
            <i class="fa-solid fa-circle-check text-white"></i>
            <span id="toastMsg" class="text-xs font-semibold">Teks berhasil disalin!</span>
        </div>
    </div>

    <!-- HTML PREVIEW MODAL -->
    <div id="htmlPreview" class="hidden fixed inset-0 z-[150] bg-gray-900/50 backdrop-blur-md flex items-center justify-center p-12">
        <div class="bg-white w-full max-w-6xl h-full rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-gray-100">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h4 class="font-bold text-xs tracking-widest text-indigo-600 uppercase">Interactive Preview</h4>
                <button onclick="closePreview()" class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center transition-colors hover:bg-gray-100"><i class="fa-solid fa-times"></i></button>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full border-none"></iframe>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxxi-CuUu-jaXm5XN8pVl9xqQIHsBTHzPCu72clX210iTxaaFXc7yfh5R2uKXXTzFa3/exec';
        let db = { assets: [], products: [], settings: {} };
        let adminPass = '', clicks = 0, activeView = 'home', currentSilo = '', currentCategory = '';

        /**
         * Logic White Label Sanitizer: Membersihkan tanda kutip manual di sel Google Sheet
         */
        function cleanSetting(val) {
            if (!val) return "";
            let cleaned = val.toString().trim();
            if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
                cleaned = cleaned.substring(1, cleaned.length - 1);
            }
            return cleaned.trim();
        }

        function cleanColor(val) {
            const cleaned = cleanSetting(val);
            const hexMatch = cleaned.match(/#[0-9A-Fa-f]{6}/);
            return hexMatch ? hexMatch[0] : cleaned;
        }

        function getIconHTML(val, className = "") {
            const rawVal = cleanSetting(val);
            if (!rawVal) return "";
            if (rawVal.startsWith('http')) return `<img src="${rawVal}" class="${className} object-contain" />`;
            return `<i class="${rawVal} ${className}"></i>`;
        }

        /**
         * Fetch Database utama dengan error logging yang lebih informatif
         */
        async function fetchDB() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP Error! Status: ${res.status}`);
                const json = await res.json();
                if(json.status === 'success') {
                    db = json.data;
                    applySettings();
                    renderSidebar();
                    renderByView();
                }
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) { 
                console.error('Fetch Error:', e); 
                const overlay = document.getElementById('loading-overlay');
                if(overlay) overlay.innerHTML = `<div class="p-10 text-center"><p class="text-red-500 font-bold mb-2">Fetch Error: ${e.message}</p><p class="text-xs text-gray-400">Pastikan URL API Apps Script sudah benar dan dipublish sebagai 'Anyone'.</p></div>`;
            }
        }

        function applySettings() {

    const s = db.settings;

    if (!s) return;

    const color1 = cleanColor(s.brand_color_1);

    const rawColor2 = cleanSetting(s.brand_color_2) || '';

    const root = document.documentElement;

    const brandDisplay =
        document.getElementById('brandNameDisplay');

    /* PRIMARY */
    if (color1) {

        root.style.setProperty(
            '--brand-primary',
            color1
        );

    }

    /* DEFAULT */
    root.style.setProperty(
        '--brand-secondary',
        '#111827'
    );

    /* RESET STYLE */
    brandDisplay.classList.remove('gradient-text');

    brandDisplay.style.backgroundImage = 'none';

    brandDisplay.style.webkitTextFillColor = '';

    brandDisplay.style.color = '';

    /* =========================
       GRADIENT
    ========================= */

    if (
        rawColor2 &&
        rawColor2.includes('linear-gradient')
    ) {

        brandDisplay.classList.add('gradient-text');

        brandDisplay.style.backgroundImage =
            rawColor2;

        brandDisplay.style.backgroundClip =
            'text';

        brandDisplay.style.webkitBackgroundClip =
            'text';

        brandDisplay.style.webkitTextFillColor =
            'transparent';

        brandDisplay.innerHTML =
            cleanSetting(s.brand_name)
            || "iMersDocs";

    }

    /* =========================
       HTML CUSTOM
    ========================= */

    else if (
        rawColor2 &&
        rawColor2.includes('<')
    ) {

        const hexMatch =
            rawColor2.match(/#[0-9A-Fa-f]{6}/);

        const themeColor =
            hexMatch
            ? hexMatch[0]
            : '#111827';

        root.style.setProperty(
            '--brand-secondary',
            themeColor
        );

        brandDisplay.innerHTML = rawColor2;

    }

    /* =========================
       NORMAL HEX
    ========================= */

    else {

        root.style.setProperty(
            '--brand-secondary',
            rawColor2 || '#111827'
        );

        brandDisplay.style.color =
            rawColor2 || '#111827';

        brandDisplay.innerHTML =
            cleanSetting(s.brand_name)
            || "iMersDocs";
    }

    /* TITLE */
    document.title =
        cleanSetting(s.brand_name)
        || "Asset OS";

    /* LOGO */
    const logoContainer =
        document.getElementById(
            'brandLogoContainer'
        );

    if (logoContainer) {

        logoContainer.style.backgroundColor =
            color1;

        logoContainer.innerHTML =
            getIconHTML(
                s.brand_logo_icon,
                "w-6 h-6 text-white"
            );
    }

    /* FOOTER */
    document.getElementById(
        'footerDisplay'
    ).innerHTML =
        cleanSetting(s.footer_text)
        || "";
}
        // --- TIERED NAVIGATION & GRID ENGINE ---

        function renderHome() {
            activeView = 'home'; 
            updateNav('navHome');
            if(document.getElementById('globalSearch')) document.getElementById('globalSearch').value = ''; 
            
            document.getElementById('headerTitle').innerText = cleanSetting(db.settings.menu_overview_text) || "Dashboard";
            document.getElementById('breadcrumb').classList.add('hidden');

            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 animate-in">
                    ${db.products.map(p => {
                        const count = db.assets.filter(a => a.product === p.name).length;
                        return `
                            <div onclick="openVault('${p.name}')" class="saas-card p-10 flex flex-col h-full group">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white mb-8 shadow-sm group-hover:scale-110 transition-transform" style="background: ${cleanColor(p.color) || 'var(--brand-primary)'}">
                                    ${getIconHTML(p.icon, "text-lg")}
                                </div>
                                <h4 class="text-lg font-bold text-gray-900 mb-2 uppercase tracking-tight">${p.name}</h4>
                                <p class="text-xs text-gray-400 mb-10 leading-relaxed flex-1">${p.desc || 'No description'}</p>
                                <div class="flex justify-between items-center mt-auto pt-6 border-t border-gray-50">
                                    <span class="text-[10px] font-bold uppercase text-primary tracking-widest">${count} Aset Ready</span>
                                    <i class="fa-solid fa-arrow-right text-[10px] text-gray-300 transition-transform group-hover:translate-x-1"></i>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        function openVault(name) {
            activeView = 'categories'; currentSilo = name; updateNav(`side-${name}`);
            if(document.getElementById('globalSearch')) document.getElementById('globalSearch').value = ''; 
            
            document.getElementById('headerTitle').innerText = name;
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('breadcrumbProduct').innerText = name;
            document.getElementById('breadcrumbProduct').onclick = () => openVault(name);
            document.getElementById('breadcrumbCategoryContainer').classList.add('hidden');

            const prodAssets = db.assets.filter(a => a.product === name);
            const categories = [...new Set(prodAssets.map(a => a.category))];

            if(categories.length === 0) {
                document.getElementById('viewArea').innerHTML = `<div class="py-40 text-center text-gray-300 font-bold uppercase animate-in tracking-widest">Silo ini masih kosong.</div>`;
                return;
            }

            const html = `
                <div class="mb-8 animate-in">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">Pilih Kategori Aset</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        ${categories.map(cat => {
                            const count = prodAssets.filter(a => a.category === cat).length;
                            return `
                                <div onclick="openCategory('${name}', '${cat}')" class="saas-card p-8 flex items-center justify-between group">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400 group-hover:text-primary group-hover:bg-indigo-50 transition-all">
                                            <i class="fa-solid fa-folder-open text-lg"></i>
                                        </div>
                                        <div>
                                            <h5 class="font-bold text-gray-900 uppercase tracking-tight text-sm">${cat}</h5>
                                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${count} Items</p>
                                        </div>
                                    </div>
                                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-200 group-hover:text-primary transition-all"></i>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        function openCategory(prodName, catName) {
            activeView = 'assets'; currentSilo = prodName; currentCategory = catName;
            if(document.getElementById('globalSearch')) document.getElementById('globalSearch').value = ''; 

            document.getElementById('breadcrumbCategoryContainer').classList.remove('hidden');
            document.getElementById('breadcrumbCategory').innerText = catName;

            const assets = db.assets.filter(a => a.product === prodName && a.category === catName);
            const subGroups = [...new Set(assets.map(a => a.sub_category || 'GENERAL'))];

function showToast(msg) {
    document.getElementById('toastMsg').innerText = msg;
    const t = document.getElementById('toast');
    t.style.opacity = '1';
    t.style.pointerEvents = 'auto';
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.pointerEvents = 'none';
    }, 3000);
}

function copyToClip(text) {
    const el = document.createElement('textarea');
    el.value = text;
    el.setAttribute('readonly', '');
    el.style.position = 'absolute';
    el.style.left = '-9999px';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast("Disalin ke clipboard!");
}

/**
 * 🛡️ FUNGSI DOWNLOAD SAKTI (ANTI-OPEN WINDOW)
 * Sudah diperbaiki untuk mendukung URL hosting sendiri dengan Blob Fetching
 */
async function downloadImage(url, filename = 'imersdocs-file') {
    if (!url) return showToast("URL tidak tersedia!");
    
    try {
        showToast("Sedang Mengunduh...");
        
        // 1. Ambil data biner gambar (Force Fetch)
        const response = await fetch(url, {
            method: 'GET',
            mode: 'cors', // Penting untuk download cross-origin
            cache: 'no-cache'
        });
        
        if (!response.ok) throw new Error("Gagal mengambil file dari server.");
        
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        
        // 2. Triger download via link hantu dengan Object URL
        const link = document.createElement('a');
        link.href = blobUrl;
        
        // Deteksi extension dari URL asli agar file tidak rusak
        const extension = url.split('.').pop().split(/\#|\?/)[0] || 'png';
        link.download = `${filename}.${extension}`;
        
        document.body.appendChild(link);
        link.click();
        
        // 3. Bersihkan memori browser
        document.body.removeChild(link);
        window.URL.revokeObjectURL(blobUrl);
        
        showToast("Download Berhasil!");
    } catch(err) {
        console.error("Download Error Detail:", err);
        // Fallback terakhir: jika fetch gagal total (misal CORS hosting sangat ketat), baru buka tab
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', filename);
        link.target = "_blank";
        link.click();
        showToast("Proses mengunduh...");
    }
}
